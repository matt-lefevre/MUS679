<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MUS 679 EQ Trainer</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">
        <h1>MUS 679 EQ trainer</h1>
      </div>
    </div>
    <div class="mode-toggle" role="tablist">
      <button id="modePlay" class="active" role="tab">Play</button>
      <button id="modeQuiz" role="tab">Quiz</button>
    </div>
  </header>

  <!-- PLAY MODE -->
  <section id="playPanel">
    <div class="card">
      <div class="eq-display">
        <canvas id="eqCanvas"></canvas>
      </div>
      <div class="eq-controls">
        <div class="knob-group freq">
          <div class="knob-label">
            <span class="name">Frequency</span>
            <span class="value"><span id="freqVal">1</span><span class="unit" id="freqUnit">kHz</span></span>
          </div>
          <input type="range" id="freqSlider" min="0" max="7" value="4" step="1" list="freqStops" />
          <datalist id="freqStops">
            <option value="0"></option><option value="1"></option><option value="2"></option>
            <option value="3"></option><option value="4"></option><option value="5"></option>
            <option value="6"></option><option value="7"></option>
          </datalist>
        </div>
        <div class="knob-group gain">
          <div class="knob-label">
            <span class="name">Gain</span>
            <span class="value"><span id="gainVal">0</span><span class="unit">dB</span></span>
          </div>
          <input type="range" id="gainSlider" min="-18" max="18" value="0" step="1" />
        </div>
        <div class="knob-group q">
          <div class="knob-label">
            <span class="name">Q</span>
            <span class="value"><span id="qVal">1</span></span>
          </div>
          <input type="range" id="qSlider" min="1" max="18" value="1" step="1" />
        </div>
        <button id="bypassBtn" class="bypass-btn">Bypass</button>
      </div>
    </div>

    <div class="card">
      <h2>Audio Source</h2>
      <div class="source-row">
        <div class="dropzone" id="dropzone">
          <div class="dz-icon" id="dropzoneIcon">🎵</div>
          <div class="dz-title" id="dropzoneTitle">Drop an audio file</div>
          <div class="dz-hint" id="dropzoneHint">or click to browse — mp3, wav, m4a, ogg</div>
          <input type="file" id="fileInput" accept="audio/*" hidden />
        </div>
        <div class="sample-list" id="sampleList">
          <button class="sample-btn" data-source="pink">
            <span class="play-icon">▶</span>
            <span class="sample-name">Pink Noise</span>
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- QUIZ MODE -->
  <section id="quizPanel" class="quiz-panel">
    <div class="card">
      <div class="quiz-header">
        <div class="left">
          <h2>Quiz Mode</h2>
          <p>Which frequency is boosted?</p>
        </div>
        <div class="score">
          <div class="pill" id="scorePill">0 / 0</div>
        </div>
      </div>

      <div class="difficulty-row">
        <span class="diff-label">Difficulty</span>
        <div class="diff-group" id="diffGroup">
          <button class="diff-btn" data-diff="easy">Easy</button>
          <button class="diff-btn active" data-diff="medium">Medium</button>
          <button class="diff-btn" data-diff="hard">Hard</button>
        </div>
      </div>

      <div class="source-row quiz-source-row">
        <div class="dropzone" id="quizDropzone">
          <div class="dz-icon" id="quizDropzoneIcon">🎵</div>
          <div class="dz-title" id="quizDropzoneTitle">Drop an audio file</div>
          <div class="dz-hint" id="quizDropzoneHint">or click to browse — mp3, wav, m4a, ogg</div>
          <input type="file" id="quizFileInput" accept="audio/*" hidden />
        </div>
        <div class="sample-list" id="quizSampleList">
          <button class="sample-btn" data-qsource="pink">
            <span class="play-icon">▶</span>
            <span class="sample-name">Pink Noise</span>
          </button>
        </div>
      </div>

      <div class="dry-eq-toggle" id="dryEqToggle" role="switch" aria-checked="false" tabindex="0" aria-disabled="true">
        <span class="toggle-label left">Dry</span>
        <div class="toggle-track"><div class="toggle-knob"></div></div>
        <span class="toggle-label right">EQ'd</span>
      </div>

      <div class="freq-guess" id="freqGuess"></div>

      <div class="quiz-actions">
        <div class="feedback" id="quizFeedback">Select a source to start.</div>
        <button class="btn primary" id="quizAction" disabled>New Question</button>
      </div>
    </div>
  </section>
</div>
<script src="script.js"></script>
</body>
</html>
